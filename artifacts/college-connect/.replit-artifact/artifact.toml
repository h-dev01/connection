kind = "web"
previewPath = "/"
title = "CollegeConnect"
version = "1.0.0"
id = "artifacts/college-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18454

[services.development]
run = "pnpm --filter @workspace/college-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-connect", "run", "build" ]
publicDir = "artifacts/college-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18454"
BASE_PATH = "/"
